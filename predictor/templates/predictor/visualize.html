<!-- predictor/templates/predictor/visualize.html -->

{% extends 'predictor/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row mb-4">
    <div class="col">
        <h2>
            <i class="fas fa-chart-pie"></i>
            Визуализация данных #{{ job.job_id }}
        </h2>
    </div>
</div>

<div class="row">
    <div class="col-12">
        <div class="card mb-4">
            <div class="card-header">
                <ul class="nav nav-tabs card-header-tabs" id="vizTabs" role="tablist">
                    <li class="nav-item">
                        <button class="nav-link active" id="map-tab" data-bs-toggle="tab"
                                data-bs-target="#map" type="button" role="tab">
                            <i class="fas fa-map"></i> Карта
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="timeseries-tab" data-bs-toggle="tab"
                                data-bs-target="#timeseries" type="button" role="tab">
                            <i class="fas fa-chart-line"></i> Временной ряд
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="histogram-tab" data-bs-toggle="tab"
                                data-bs-target="#histogram" type="button" role="tab">
                            <i class="fas fa-chart-bar"></i> Распределение
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" id="3d-tab" data-bs-toggle="tab"
                                data-bs-target="#3d" type="button" role="tab">
                            <i class="fas fa-cube"></i> 3D визуализация
                        </button>
                    </li>
                </ul>
            </div>
            <div class="card-body">
                <div class="tab-content" id="vizTabsContent">
                    <!-- Карта -->
                    <div class="tab-pane fade show active" id="map" role="tabpanel">
                        <div class="text-center">
                            <img src="{% url 'predictor:download' job.job_id 'plot' %}"
                                 class="img-fluid" alt="Map visualization">
                            <div class="mt-3">
                                <button class="btn btn-sm btn-primary" onclick="window.print()">
                                    <i class="fas fa-print"></i> Печать
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Временной ряд -->
                    <div class="tab-pane fade" id="timeseries" role="tabpanel">
                        <canvas id="timeSeriesChart" height="400"></canvas>
                    </div>

                    <!-- Гистограмма -->
                    <div class="tab-pane fade" id="histogram" role="tabpanel">
                        <canvas id="histogramChart" height="400"></canvas>
                    </div>

                    <!-- 3D визуализация (упрощенная) -->
                    <div class="tab-pane fade" id="3d" role="tabpanel">
                        <div id="3d-container" style="height: 500px;">
                            <canvas id="3dChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Данные для графиков (пример)
    const dates = {% if forecasts %}[{% for f in forecasts %}'{{ f.date|date:"d.m" }}',{% endfor %}]{% else %}[]{% endif %};
    const concentrations = {% if forecasts %}[{% for f in forecasts %}{{ f.mean_ice_concentration }},{% endfor %}]{% else %}[]{% endif %};

    // Временной ряд
    const ctx1 = document.getElementById('timeSeriesChart').getContext('2d');
    new Chart(ctx1, {
        type: 'line',
        data: {
            labels: dates,
            datasets: [{
                label: 'Концентрация льда',
                data: concentrations,
                borderColor: '#00c6fb',
                backgroundColor: 'rgba(0, 198, 251, 0.1)',
                tension: 0.4,
                fill: true,
                pointBackgroundColor: '#fff',
                pointBorderColor: '#00c6fb',
                pointRadius: 5,
                pointHoverRadius: 8
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: 'white' }
                },
                tooltip: {
                    mode: 'index',
                    intersect: false
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 1,
                    grid: { color: 'rgba(255,255,255,0.1)' },
                    ticks: { color: 'white' }
                },
                x: {
                    grid: { color: 'rgba(255,255,255,0.1)' },
                    ticks: { color: 'white' }
                }
            }
        }
    });

    // Гистограмма
    const ctx2 = document.getElementById('histogramChart').getContext('2d');
    // Генерируем данные для гистограммы
    const bins = 20;
    const histData = new Array(bins).fill(0);
    const binEdges = [];

    if (concentrations.length > 0) {
        concentrations.forEach(val => {
            const binIdx = Math.floor(val * bins);
            if (binIdx >= 0 && binIdx < bins) histData[binIdx]++;
        });

        for (let i = 0; i <= bins; i++) {
            binEdges.push((i / bins).toFixed(2));
        }
    }

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: binEdges.slice(0, -1),
            datasets: [{
                label: 'Частота',
                data: histData,
                backgroundColor: 'rgba(0, 198, 251, 0.7)',
                borderColor: '#00c6fb',
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: {
                    labels: { color: 'white' }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: { color: 'rgba(255,255,255,0.1)' },
                    ticks: { color: 'white' }
                },
                x: {
                    title: {
                        display: true,
                        text: 'Концентрация льда',
                        color: 'white'
                    },
                    grid: { color: 'rgba(255,255,255,0.1)' },
                    ticks: { color: 'white' }
                }
            }
        }
    });

    // 3D график (упрощенный)
    if (document.getElementById('3dChart')) {
        // Здесь можно добавить Three.js для 3D визуализации
        // Для простоты оставим заглушку
        const ctx3 = document.getElementById('3dChart').getContext('2d');
        ctx3.fillStyle = 'rgba(0, 198, 251, 0.1)';
        ctx3.fillRect(0, 0, 800, 400);
        ctx3.font = '20px Arial';
        ctx3.fillStyle = 'white';
        ctx3.textAlign = 'center';
        ctx3.fillText('3D визуализация в разработке', 400, 200);
    }
});
</script>

<style>
.nav-tabs .nav-link {
    color: rgba(255, 255, 255, 0.7);
    border: none;
}
.nav-tabs .nav-link:hover {
    color: white;
    border: none;
}
.nav-tabs .nav-link.active {
    color: #00c6fb;
    background: transparent;
    border-bottom: 2px solid #00c6fb;
}
</style>
{% endblock %}
